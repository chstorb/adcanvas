name: Auto Version & Release (Pro)

on:
  push:
    branches:
      - main

jobs:
  version-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # -------------------------------------------------------
      # 0) Checkout
      # -------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -------------------------------------------------------
      # 1) Tools deterministisch installieren
      # -------------------------------------------------------
      - name: Install dependencies
        run: |
          npm init -y
          npm install semver@7 terser@5 clean-css-cli@5 conventional-changelog-cli@5

      # -------------------------------------------------------
      # 2) Version automatisch bestimmen (semantisch korrekt)
      # -------------------------------------------------------
      - name: Determine next version
        id: version
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then LAST_TAG="v0.0.0"; fi

          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")

          if echo "$COMMITS" | grep -qi "BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qi "^feat"; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          NEXT=$(npx semver -i $BUMP $LAST_TAG)
          echo "next=$NEXT" >> $GITHUB_OUTPUT

      # -------------------------------------------------------
      # 3) dist/ neu erzeugen
      # -------------------------------------------------------
      - name: Prepare dist folder
        run: rm -rf dist && mkdir dist

      # -------------------------------------------------------
      # 4) Build (JS + CSS)
      # -------------------------------------------------------
      - name: Minify JavaScript
        run: |
          npx terser src/js/adcanvas.js \
            --compress --mangle \
            --output dist/adcanvas.min.js

      - name: Copy unminified JS
        run: cp src/js/adcanvas.js dist/adcanvas.js

      - name: Minify CSS
        run: |
          npx cleancss -o dist/adcanvas.min.css src/css/adcanvas.css

      - name: Copy unminified CSS
        run: cp src/css/adcanvas.css dist/adcanvas.css

      # -------------------------------------------------------
      # 5) Build validieren
      # -------------------------------------------------------
      - name: Validate build
        run: |
          test -f dist/adcanvas.min.js || (echo "Build failed: JS missing" && exit 1)
          test -f dist/adcanvas.min.css || (echo "Build failed: CSS missing" && exit 1)

      # -------------------------------------------------------
      # 6) dist committen (nur bei Änderungen)
      # -------------------------------------------------------
      - name: Commit dist files
        id: commitdist
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dist/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Build dist for release ${{ steps.version.outputs.next }}"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # -------------------------------------------------------
      # 7) Changelog generieren (nur wenn Änderungen existieren)
      # -------------------------------------------------------
      - name: Generate changelog
        if: steps.commitdist.outputs.changed == 'true'
        run: |
          npx conventional-changelog -p angular -i CHANGELOG.md -s
          git add CHANGELOG.md
          git commit -m "Update changelog for v${{ steps.version.outputs.next }}"

      # -------------------------------------------------------
      # 8) Tag erstellen (nur wenn Änderungen existieren)
      # -------------------------------------------------------
      - name: Create Git Tag
        if: steps.commitdist.outputs.changed == 'true'
        run: |
          git tag v${{ steps.version.outputs.next }}
          git push origin v${{ steps.version.outputs.next }}

      # -------------------------------------------------------
      # 9) Release Notes automatisch generieren
      # -------------------------------------------------------
      - name: Generate release notes
        if: steps.commitdist.outputs.changed == 'true'
        id: notes
        run: |
          NOTES=$(npx conventional-changelog -p angular -r 1)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # -------------------------------------------------------
      # 10) GitHub Release erstellen
      # -------------------------------------------------------
      - name: Create GitHub Release
        if: steps.commitdist.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.next }}
          name: Release v${{ steps.version.outputs.next }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            dist/adcanvas.js
            dist/adcanvas.min.js
            dist/adcanvas.css
            dist/adcanvas.min.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
