<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="260" viewBox="0 0 1200 260"
     role="img" aria-labelledby="title desc">
  <title id="title">AdCanvas – README Banner</title>
  <desc id="desc">
    Banner with icon-only logo, product name, and tagline for the AdCanvas project.
  </desc>

  <!-- Hintergrund -->
  <rect width="1200" height="260" fill="#F5F7FA"/>

  <!-- Icon links -->
  <g transform="translate(120, 60)">
    <!-- Linke Klammer { -->
    <path d="M0,26
             C4,26 4,18 4,10
             M4,10 C4,18 12,26 20,26
             M20,26 C12,26 4,34 4,42
             M4,42 C4,50 4,58 0,58"
          fill="none"
          stroke="#0066CC"
          stroke-width="4"
          stroke-linecap="round"/>

    <!-- Rechte Klammer } -->
    <path d="M80,26
             C76,26 76,18 76,10
             M76,10 C76,18 68,26 60,26
             M60,26 C68,26 76,34 76,42
             M76,42 C76,50 76,58 80,58"
          fill="none"
          stroke="#0066CC"
          stroke-width="4"
          stroke-linecap="round"/>

    <!-- 3x3 Grid -->
    <g fill="#0066CC">
      <circle cx="24" cy="22" r="4"/>
      <circle cx="36" cy="22" r="4"/>
      <circle cx="48" cy="22" r="4"/>

      <circle cx="24" cy="34" r="4"/>
      <circle cx="36" cy="34" r="4"/>
      <circle cx="48" cy="34" r="4"/>

      <circle cx="24" cy="46" r="4"/>
      <circle cx="36" cy="46" r="4"/>
      <circle cx="48" cy="46" r="4"/>
    </g>

    <!-- Pfeil -->
    <polygon points="56,28 72,34 56,40" fill="#00D4FF"/>
  </g>

  <!-- Textblock -->
  <text x="260" y="120"
        font-family="Inter, system-ui, sans-serif"
        font-size="48"
        fill="#1A1A1A"
        font-weight="700">
    AdCanvas
  </text>

  <text x="260" y="170"
        font-family="Inter, system-ui, sans-serif"
        font-size="24"
        fill="#444">
    Modular ad components for any website.
  </text>

</svg>
