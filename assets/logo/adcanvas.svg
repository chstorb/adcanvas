<svg xmlns="http://www.w3.org/2000/svg"
     width="320" height="80" viewBox="0 0 320 80"
     role="img" aria-labelledby="title desc">
  <title id="title">AdCanvas Logo</title>
  <desc id="desc">
    Icon with a 3x3 grid of dots, a right arrow in the center, wrapped in curly braces,
    followed by the text AdCanvas.
  </desc>

  <!-- Farben -->
  <!-- AdCanvas Blue: #0066CC, Engine Black: #1A1A1A, Signal Cyan: #00D4FF -->

  <!-- Icon-Gruppe -->
  <g transform="translate(20, 16)">
    <!-- Linke Klammer { -->
    <path d="M0,8
             C4,8 4,4 4,0
             M4,0 L4,0
             M4,0 C4,4 8,8 12,8
             M12,8 C8,8 4,12 4,16
             M4,16 C4,20 4,24 0,24"
          fill="none"
          stroke="#0066CC"
          stroke-width="2"
          stroke-linecap="round"/>

    <!-- Rechte Klammer } -->
    <path d="M64,8
             C60,8 60,4 60,0
             M60,0 L60,0
             M60,0 C60,4 56,8 52,8
             M52,8 C56,8 60,12 60,16
             M60,16 C60,20 60,24 64,24"
          fill="none"
          stroke="#0066CC"
          stroke-width="2"
          stroke-linecap="round"/>

    <!-- 3x3 Grid Punkte -->
    <g fill="#0066CC">
      <!-- Reihe 1 -->
      <circle cx="20" cy="4" r="2"/>
      <circle cx="28" cy="4" r="2"/>
      <circle cx="36" cy="4" r="2"/>
      <!-- Reihe 2 -->
      <circle cx="20" cy="12" r="2"/>
      <circle cx="28" cy="12" r="2"/>
      <circle cx="36" cy="12" r="2"/>
      <!-- Reihe 3 -->
      <circle cx="20" cy="20" r="2"/>
      <circle cx="28" cy="20" r="2"/>
      <circle cx="36" cy="20" r="2"/>
    </g>

    <!-- Pfeil nach rechts (Engine/Flow) -->
    <g fill="#00D4FF">
      <polygon points="40,8 48,12 40,16"/>
    </g>
  </g>

  <!-- Wortmarke -->
  <text x="110" y="32"
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18"
        fill="#1A1A1A">
    <tspan font-weight="700">AdCanvas</tspan>
    <tspan dx="6" font-weight="400">Ads Engine</tspan>
  </text>
</svg>
